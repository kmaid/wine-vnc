[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:xvfb]
command=/usr/bin/Xvfb :0 -screen 0 1024x768x16
priority=1

[program:xfce4]
command=/usr/bin/xfce4-session --display=:0
priority=2

[program:x11vnc]
command=/usr/bin/x11vnc -display :0 -forever -rfbauth /tmp/x11vnc.passwd
priority=3

[program:novnc]
command=/usr/bin/novnc_server
priority=4

[program:syncom]
command=wine "/root/.wine/drive_c/Program Files (x86)/Sync/sync-taskbar.exe"
priority=5

[program:crond]
command=/usr/sbin/crond -f -l 8
priority=6
